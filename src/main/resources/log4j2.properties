rootLogger.level = INFO
rootLogger.appenderRef.console.ref = ConsoleAppender

appender.console.name = ConsoleAppender
appender.console.type = Console
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %d{HH:mm:ss.SSS} [%t] %-5level %logger{36} - %msg%n

# Quieten noisy Flink internals
logger.flink.name = org.apache.flink
logger.flink.level = WARN

logger.akka.name = akka
logger.akka.level = WARN

logger.pekko.name = org.apache.pekko
logger.pekko.level = WARN

logger.netty.name = org.apache.flink.shaded.netty4
logger.netty.level = WARN

logger.security.name = org.apache.flink.runtime.security
logger.security.level = ERROR

logger.webmonitor.name = org.apache.flink.runtime.webmonitor
logger.webmonitor.level = ERROR
